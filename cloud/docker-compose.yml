version: '3.8'

services:
  # 1. Reverse Proxy (Caddy)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - axum_api
      - better_auth

  # 2. Auth Service (Better Auth)
  better_auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://zwork:${POSTGRES_PASSWORD}@postgres:5432/zwork_db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://api.tryzwork.app
    depends_on:
      - postgres

  # 3. Rust (Axum) API Proxy
  axum_api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://zwork:${POSTGRES_PASSWORD}@postgres:5432/zwork_db
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=https://app.posthog.com
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - postgres

  # 3. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zwork
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=zwork_db
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 4. DB Management (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@tryzwork.app
      - PGADMIN_DEFAULT_PASSWORD=zwork_admin_pass
    depends_on:
      - postgres

volumes:
  caddy_data:
  caddy_config:
  pg_data:

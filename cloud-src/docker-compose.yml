services:
  # 1. Reverse Proxy (Caddy)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - axum_api
      - better_auth

  # 2. Auth Service (Better Auth)
  better_auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://zwork:${POSTGRES_PASSWORD}@postgres:5432/zwork_db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://api.tryzwork.app
      - APP_PUBLIC_URL=${APP_PUBLIC_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - postgres

  # 3. Rust (Axum) API Proxy
  axum_api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://zwork:${POSTGRES_PASSWORD}@postgres:5432/zwork_db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST}
      - OWNER_EMAILS=${OWNER_EMAILS}
      - ENABLE_HOSTED_GATEWAY=${ENABLE_HOSTED_GATEWAY}
      - ENABLE_BILLING=${ENABLE_BILLING}
      - ENABLE_EMAIL_AUTH=${ENABLE_EMAIL_AUTH}
      - ENABLE_COUPONS=${ENABLE_COUPONS}
      - AUTH_INTERNAL_BASE=http://better_auth:3000/api/auth
      - ROUTER_LABEL=${ROUTER_LABEL}
      - ROUTER_PROVIDER_ORDER=${ROUTER_PROVIDER_ORDER}
      - STRIPE_PRICE_PRO_MONTHLY=${STRIPE_PRICE_PRO_MONTHLY}
      - STRIPE_PRICE_PRO_ANNUAL=${STRIPE_PRICE_PRO_ANNUAL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_BASE_URL=${GROQ_BASE_URL}
      - GROQ_MODEL_PRIMARY=${GROQ_MODEL_PRIMARY}
      - GROQ_MODEL_FALLBACK=${GROQ_MODEL_FALLBACK}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - CEREBRAS_BASE_URL=${CEREBRAS_BASE_URL}
      - CEREBRAS_MODEL_PRIMARY=${CEREBRAS_MODEL_PRIMARY}
      - CEREBRAS_MODEL_FALLBACK=${CEREBRAS_MODEL_FALLBACK}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_BASE_URL=${MISTRAL_BASE_URL}
      - MISTRAL_MODEL_PRIMARY=${MISTRAL_MODEL_PRIMARY}
      - MISTRAL_MODEL_FALLBACK=${MISTRAL_MODEL_FALLBACK}
      - AUTH_SESSION_URL=http://better_auth:3000/api/auth/get-session
      - ZWORK_GATEWAY_TOKEN=${ZWORK_GATEWAY_TOKEN}
      - ROOT_REQUESTS_PER_5H=${ROOT_REQUESTS_PER_5H}
      - WEEKLY_LIMIT_MULTIPLIER=${WEEKLY_LIMIT_MULTIPLIER}
      - MAX_CONCURRENT_ROOT_RUNS=${MAX_CONCURRENT_ROOT_RUNS}
      - DEV_COUPON_CODES=${DEV_COUPON_CODES}
    depends_on:
      - postgres
      - better_auth

  # 3. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zwork
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=zwork_db
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 4. DB Management (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@tryzwork.app
      - PGADMIN_DEFAULT_PASSWORD=zwork_admin_pass
    depends_on:
      - postgres

volumes:
  caddy_data:
  caddy_config:
  pg_data:
